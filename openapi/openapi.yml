        seniorBondAddress:
          type: string
        cTokenAddress:
          type: string
        underlyingAddress:
          type: string
        underlyingSymbol:
          type: string
          example: "USDC"
        underlyingDecimals:
          type: integer
          example: 6
        rewardPoolAddress:
          type: string
